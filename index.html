<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; overscroll-behavior: none; background-color: #000; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
        * { -webkit-tap-highlight-color: transparent; }
        .recording-item { transition: background-color 0.2s; }
        .recording-item:active { background-color: #111; }
        .t9-btn:active { background-color: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="w-screen h-screen flex flex-col absolute top-0 left-0">

    <div id="main-ui" class="flex-1 flex flex-col w-full h-full relative z-10 bg-black">
        <div class="w-full flex justify-between items-center px-6 py-5 border-b border-gray-900">
            <span id="secret-trigger" class="text-2xl font-semibold tracking-tight select-none">Recordings</span>
        </div>
        <div id="recording-list" class="flex-1 overflow-y-auto px-6 py-2"></div>
        <div class="w-full py-8 flex justify-center border-t border-gray-900">
            <div class="w-16 h-16 rounded-full border-4 border-gray-800 flex items-center justify-center" id="record-trigger">
                <div class="w-14 h-14 rounded-full bg-red-600"></div>
            </div>
        </div>
    </div>

    <div id="t9-ui" class="hidden absolute top-0 left-0 w-full h-full bg-black/80 backdrop-blur-sm z-40 flex-col">
        <div class="flex-1 w-full" id="t9-dismiss"></div>
        <div id="t9-container" class="w-full pb-8 px-6 flex justify-end">
            <div class="bg-[#1c1c1e] p-5 rounded-3xl w-[260px] shadow-2xl border border-gray-800">
                <div id="t9-display" class="text-right text-2xl font-mono tracking-widest mb-6 h-8 text-white border-b border-gray-800 pb-2"></div>
                <div class="grid grid-cols-3 gap-3">
                    <button class="t9-btn bg-white/5 rounded-full aspect-square text-xl font-light" data-val="1">1</button>
                    <button class="t9-btn bg-white/5 rounded-full aspect-square text-xl font-light" data-val="2">2</button>
                    <button class="t9-btn bg-white/5 rounded-full aspect-square text-xl font-light" data-val="3">3</button>
                    <button class="t9-btn bg-white/5 rounded-full aspect-square text-xl font-light" data-val="4">4</button>
                    <button class="t9-btn bg-white/5 rounded-full aspect-square text-xl font-light" data-val="5">5</button>
                    <button class="t9-btn bg-white/5 rounded-full aspect-square text-xl font-light" data-val="6">6</button>
                    <button class="t9-btn bg-white/5 rounded-full aspect-square text-xl font-light" data-val="7">7</button>
                    <button class="t9-btn bg-white/5 rounded-full aspect-square text-xl font-light" data-val="8">8</button>
                    <button class="t9-btn bg-white/5 rounded-full aspect-square text-xl font-light" data-val="9">9</button>
                    <button class="t9-btn bg-red-500/20 text-red-500 rounded-full aspect-square text-lg font-medium" data-val="clear">C</button>
                    <button class="t9-btn bg-white/5 rounded-full aspect-square text-xl font-light" data-val="0">0</button>
                    <button id="t9-submit" class="bg-blue-600 rounded-full aspect-square text-xl font-medium">✓</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-ui" class="hidden absolute top-0 left-0 w-full h-full bg-black z-50 flex-col overflow-y-auto">
        <div class="sticky top-0 bg-black/90 backdrop-blur-md z-10 px-6 py-5 flex justify-between items-center border-b border-gray-900">
            <span class="text-xl font-semibold">Configuration</span>
            <button id="close-settings" class="text-blue-500 font-medium tracking-wide">Done</button>
        </div>
        
        <div class="px-6 py-6 flex flex-col gap-8 mb-10">
            
            <div class="flex flex-col gap-4">
                <span class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Operation Mode</span>
                <div class="flex bg-[#1c1c1e] rounded-xl p-1">
                    <button id="mode-btn-manual" class="flex-1 bg-gray-800 text-white rounded-lg py-2.5 text-sm font-medium transition-all">Manual (T9)</button>
                    <button id="mode-btn-auto" class="flex-1 text-gray-500 rounded-lg py-2.5 text-sm font-medium transition-all">Integration</button>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <span class="text-sm font-semibold text-gray-500 uppercase tracking-wider">ElevenLabs Setup</span>
                <input type="password" id="api-key" placeholder="API Key" class="w-full bg-[#1c1c1e] rounded-xl px-4 py-3.5 text-white outline-none">
                <input type="text" id="voice-id" placeholder="Voice ID" class="w-full bg-[#1c1c1e] rounded-xl px-4 py-3.5 text-white outline-none">
            </div>

            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <span class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Prediction Template</span>
                    <button id="insert-var-btn" class="text-blue-500 text-sm font-medium">+ Variable</button>
                </div>
                <input type="text" id="custom-title" placeholder="Custom Title (Optional)" class="w-full bg-[#1c1c1e] rounded-xl px-4 py-3.5 text-white outline-none text-sm">
                <textarea id="template-text" rows="3" placeholder="I knew you would pick [X]" class="w-full bg-[#1c1c1e] rounded-xl px-4 py-3.5 text-white outline-none resize-none text-sm"></textarea>
            </div>

            <div id="section-manual" class="flex flex-col gap-8">
                <div class="flex flex-col gap-4">
                    <span class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Word List (One per line)</span>
                    <textarea id="word-list" rows="5" class="w-full bg-[#1c1c1e] rounded-xl px-4 py-3.5 text-white outline-none resize-none leading-relaxed text-sm whitespace-pre"></textarea>
                </div>
                <div class="flex flex-col gap-4">
                    <div class="bg-[#1c1c1e] rounded-xl px-4 py-3.5 flex flex-col gap-4">
                        <div class="flex justify-between items-center">
                            <span class="text-white text-sm">Keypad Position</span>
                            <select id="keypad-pos" class="bg-transparent text-blue-500 outline-none text-right text-sm appearance-none">
                                <option value="right" class="bg-[#1c1c1e]">Bottom Right</option>
                                <option value="left" class="bg-[#1c1c1e]">Bottom Left</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div id="section-auto" class="hidden flex-col gap-8">
                <div class="flex flex-col gap-4">
                    <span class="text-sm font-semibold text-gray-500 uppercase tracking-wider">External Inject</span>
                    <div class="flex gap-2 w-full">
                        <input type="text" id="inject-id" placeholder="Inject ID" class="flex-1 bg-[#1c1c1e] rounded-xl px-4 py-3.5 text-white outline-none text-sm">
                        <button id="test-inject-btn" class="bg-[#1c1c1e] text-blue-500 px-4 rounded-xl font-medium border border-gray-800 text-sm">Test</button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <span class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Timing & Environment</span>
                <div class="bg-[#1c1c1e] rounded-xl px-4 py-3.5 flex flex-col gap-4">
                    <div class="flex justify-between items-center">
                        <span class="text-white text-sm">Prediction Date</span>
                        <input type="datetime-local" id="base-date" class="bg-transparent text-blue-500 outline-none text-right text-sm">
                    </div>
                    <div class="w-full h-[1px] bg-gray-800"></div>
                    <div class="flex flex-col gap-2">
                        <span class="text-white text-sm">Noise Volume</span>
                        <input type="range" id="noise-volume" min="1" max="100" value="30" class="w-full accent-blue-500">
                    </div>
                    <div class="flex flex-col gap-2">
                        <span class="text-white text-sm">Noise Intensity</span>
                        <input type="range" id="noise-intensity" min="1" max="100" value="40" class="w-full accent-blue-500">
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <span class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Dummy Data</span>
                    <button id="add-dummy-btn" class="text-blue-500 text-sm font-medium">+ Add</button>
                </div>
                <div id="dummy-settings-list" class="flex flex-col gap-3"></div>
            </div>
            
            <div id="error-console" class="hidden flex-col gap-3 p-4 bg-red-950/20 border border-red-900/50 rounded-xl mt-4">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-red-500 uppercase tracking-wider">System Log</span>
                    <button id="clear-errors" class="text-xs text-red-400 font-medium">Clear</button>
                </div>
                <div id="error-log-content" class="text-xs font-mono text-red-400 max-h-32 overflow-y-auto flex flex-col gap-1.5 break-words"></div>
            </div>
        </div>
    </div>

    <script>
        const ui = {
            main: document.getElementById('main-ui'),
            settings: document.getElementById('settings-ui'),
            t9: document.getElementById('t9-ui'),
            t9Container: document.getElementById('t9-container'),
            t9Display: document.getElementById('t9-display'),
            list: document.getElementById('recording-list'),
            dummyList: document.getElementById('dummy-settings-list'),
            errConsole: document.getElementById('error-console'),
            errContent: document.getElementById('error-log-content'),
            modeBtnManual: document.getElementById('mode-btn-manual'),
            modeBtnAuto: document.getElementById('mode-btn-auto'),
            secManual: document.getElementById('section-manual'),
            secAuto: document.getElementById('section-auto')
        };

        const defaultMnemonica = [
            "Four of Clubs", "Two of Hearts", "Seven of Diamonds", "Three of Clubs", "Four of Hearts", "Six of Diamonds", "Ace of Spades", "Five of Hearts", "Nine of Spades", "Two of Spades", "Queen of Hearts", "Three of Diamonds", "Queen of Clubs", "Eight of Hearts", "Six of Spades", "Five of Spades", "Nine of Hearts", "King of Clubs", "Two of Diamonds", "Jack of Hearts", "Three of Spades", "Eight of Spades", "Six of Hearts", "Ten of Clubs", "Five of Diamonds", "King of Diamonds", "Two of Clubs", "Three of Hearts", "Eight of Diamonds", "Five of Clubs", "King of Spades", "Jack of Diamonds", "Eight of Clubs", "Ten of Spades", "King of Hearts", "Jack of Clubs", "Seven of Spades", "Ten of Hearts", "Ace of Diamonds", "Four of Spades", "Seven of Hearts", "Four of Diamonds", "Ace of Clubs", "Nine of Clubs", "Jack of Spades", "Queen of Diamonds", "Seven of Clubs", "Queen of Spades", "Ten of Diamonds", "Six of Clubs", "Ace of Hearts", "Nine of Diamonds"
        ];

        document.getElementById('word-list').value = defaultMnemonica.join('\n');

        let state = {
            mode: 'manual',
            target: { duration: 4, audioUrl: null, isReady: false },
            dummies: [
                { name: 'Recording 003', duration: 45 },
                { name: 'Recording 002', duration: 125 },
                { name: 'Recording 001', duration: 74 }
            ],
            audioCtx: null,
            activeAudio: null,
            activeNoise: null,
            t9Input: '',
            pollingTimer: null,
            lastFetchVal: null
        };

        ui.modeBtnManual.onclick = () => {
            state.mode = 'manual';
            ui.modeBtnManual.classList.replace('text-gray-500', 'text-white');
            ui.modeBtnManual.classList.add('bg-gray-800');
            ui.modeBtnAuto.classList.replace('text-white', 'text-gray-500');
            ui.modeBtnAuto.classList.remove('bg-gray-800');
            ui.secManual.classList.remove('hidden');
            ui.secManual.classList.add('flex');
            ui.secAuto.classList.add('hidden');
            ui.secAuto.classList.remove('flex');
        };

        ui.modeBtnAuto.onclick = () => {
            state.mode = 'integration';
            ui.modeBtnAuto.classList.replace('text-gray-500', 'text-white');
            ui.modeBtnAuto.classList.add('bg-gray-800');
            ui.modeBtnManual.classList.replace('text-white', 'text-gray-500');
            ui.modeBtnManual.classList.remove('bg-gray-800');
            ui.secAuto.classList.remove('hidden');
            ui.secAuto.classList.add('flex');
            ui.secManual.classList.add('hidden');
            ui.secManual.classList.remove('flex');
        };

        const initAudio = () => {
            if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
        };

        const createWhiteNoise = () => {
            initAudio();
            const bufferSize = 2 * state.audioCtx.sampleRate;
            const noiseBuffer = state.audioCtx.createBuffer(1, bufferSize, state.audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            
            const noise = state.audioCtx.createBufferSource();
            noise.buffer = noiseBuffer;
            noise.loop = true;
            
            const filter = state.audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            const rawIntensity = parseFloat(document.getElementById('noise-intensity').value);
            const minFreq = 100;
            const maxFreq = 6000;
            const mappedFreq = minFreq + (rawIntensity / 100) * (maxFreq - minFreq);
            filter.frequency.value = mappedFreq;
            
            const gain = state.audioCtx.createGain();
            const rawVol = parseFloat(document.getElementById('noise-volume').value);
            const minVol = 0.001;
            const maxVol = 0.08;
            const mappedVol = minVol + Math.pow(rawVol / 100, 2) * (maxVol - minVol);
            gain.gain.value = mappedVol;
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(state.audioCtx.destination);
            return { source: noise, filter: filter, gain: gain };
        };

        const stopPlayback = () => {
            if (state.activeAudio) {
                state.activeAudio.pause();
                state.activeAudio.currentTime = 0;
            }
            if (state.activeNoise) {
                try { state.activeNoise.source.stop(); } catch(e){}
            }
            state.activeAudio = null;
            state.activeNoise = null;
            document.querySelectorAll('.play-btn-active').forEach(btn => {
                btn.className = 'w-0 h-0 border-t-[7px] border-t-transparent border-l-[12px] border-l-white border-b-[7px] border-b-transparent ml-2 outline-none';
                btn.classList.remove('play-btn-active');
            });
        };

        const playItem = (url, durationSec, btnElement) => {
            if (btnElement.classList.contains('play-btn-active')) {
                stopPlayback();
                return;
            }
            stopPlayback();
            
            btnElement.className = 'play-btn-active w-3 h-3 bg-white ml-2 outline-none rounded-sm';
            state.activeNoise = createWhiteNoise();
            state.activeNoise.source.start();

            if (url) {
                state.activeAudio = new Audio(url);
                state.activeAudio.play();
                state.activeAudio.onended = stopPlayback;
            } else {
                setTimeout(stopPlayback, durationSec * 1000);
            }
        };

        const formatTime = (dateObj) => {
            return dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
        };

        const formatDur = (sec) => {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        };

        const logErr = (msg) => {
            ui.errConsole.classList.remove('hidden');
            ui.errConsole.classList.add('flex');
            const d = document.createElement('div');
            d.textContent = `[${new Date().toLocaleTimeString('en-US', {hour12:false})}] ${msg}`;
            ui.errContent.appendChild(d);
        };

        document.getElementById('clear-errors').onclick = () => {
            ui.errContent.innerHTML = '';
            ui.errConsole.classList.add('hidden');
            ui.errConsole.classList.remove('flex');
        };

        const renderList = () => {
            ui.list.innerHTML = '';
            const base = new Date(document.getElementById('base-date').value || Date.now());
            
            const customTitle = document.getElementById('custom-title').value.trim();
            const targetName = customTitle !== '' ? customTitle : `Recording ${String(state.dummies.length + 1).padStart(3, '0')}`;
            
            const targetRow = createListElement(targetName, 'Today', formatTime(base), state.target.duration, true, state.target.isReady, state.target.audioUrl);
            ui.list.appendChild(targetRow);

            let currentOffset = base.getTime();
            state.dummies.forEach((d) => {
                currentOffset -= (Math.floor(Math.random() * 120) + 60) * 60000; 
                const dDate = new Date(currentOffset);
                const isSameDay = dDate.toDateString() === base.toDateString();
                const isYesterday = new Date(base.getTime() - 86400000).toDateString() === dDate.toDateString();
                
                let dateStr = dDate.toLocaleDateString('en-US', { day: '2-digit', month: '2-digit', year: 'numeric' });
                if (isSameDay) dateStr = 'Today';
                else if (isYesterday) dateStr = 'Yesterday';

                const row = createListElement(d.name, dateStr, formatTime(dDate), d.duration, false, true, null);
                ui.list.appendChild(row);
            });
        };

        const createListElement = (name, dateStr, timeStr, duration, isTarget, isReady, audioUrl) => {
            const row = document.createElement('div');
            row.className = 'recording-item w-full flex justify-between items-center py-3.5 border-b border-gray-900 cursor-pointer';
            
            const leftDiv = document.createElement('div');
            leftDiv.className = 'flex flex-col';
            
            const titleSpan = document.createElement('span');
            titleSpan.className = 'font-medium text-[17px] tracking-wide';
            titleSpan.textContent = name;

            const dateSpan = document.createElement('span');
            dateSpan.className = 'text-gray-500 text-[13px] mt-0.5';
            
            let durText = formatDur(duration);
            if (isTarget && !isReady) durText = durText.replace(':', ' ');
            
            dateSpan.textContent = `${dateStr} ${timeStr} \u2022 ${durText}`;
            if (isTarget) dateSpan.id = 'info-target';
            
            leftDiv.appendChild(titleSpan);
            leftDiv.appendChild(dateSpan);
            
            const rightContainer = document.createElement('div');
            rightContainer.className = 'flex items-center justify-center w-12 h-12';

            const playBtn = document.createElement('button');
            playBtn.className = 'w-0 h-0 border-t-[7px] border-t-transparent border-l-[12px] border-l-white border-b-[7px] border-b-transparent ml-2 outline-none';
            
            row.onclick = () => {
                if(!isTarget || isReady) playItem(audioUrl, duration, playBtn);
            };

            rightContainer.appendChild(playBtn);
            row.appendChild(leftDiv);
            row.appendChild(rightContainer);
            return row;
        };

        const renderDummySettings = () => {
            ui.dummyList.innerHTML = '';
            state.dummies.forEach((dummy, idx) => {
                const r = document.createElement('div');
                r.className = 'flex gap-2 w-full';

                const n = document.createElement('input');
                n.type = 'text';
                n.value = dummy.name;
                n.className = 'flex-1 bg-[#1c1c1e] rounded-lg px-3 py-3 text-white outline-none text-sm';
                n.onchange = e => state.dummies[idx].name = e.target.value;

                const d = document.createElement('input');
                d.type = 'text';
                d.value = formatDur(dummy.duration);
                d.className = 'w-20 bg-[#1c1c1e] rounded-lg px-3 py-3 text-white outline-none text-sm text-center';
                d.onchange = e => {
                    const pts = e.target.value.split(':');
                    if(pts.length === 2) state.dummies[idx].duration = (parseInt(pts[0])*60) + parseInt(pts[1]);
                };

                const del = document.createElement('button');
                del.innerHTML = '✕';
                del.className = 'w-10 bg-red-900/30 text-red-500 rounded-lg flex items-center justify-center';
                del.onclick = () => { state.dummies.splice(idx, 1); renderDummySettings(); };

                r.append(n, d, del);
                ui.dummyList.appendChild(r);
            });
        };

        document.getElementById('add-dummy-btn').onclick = () => {
            const nextNum = state.dummies.length + 1;
            state.dummies.unshift({ name: `Recording ${String(nextNum).padStart(3, '0')}`, duration: 0 });
            renderDummySettings();
        };

        document.getElementById('insert-var-btn').onclick = () => {
            const t = document.getElementById('template-text');
            const pos = t.selectionStart;
            t.value = t.value.substring(0, pos) + '[X]' + t.value.substring(t.selectionEnd);
            t.focus();
            t.selectionEnd = pos + 3;
        };

        document.getElementById('keypad-pos').onchange = (e) => {
            if (e.target.value === 'right') {
                ui.t9Container.classList.add('justify-end');
                ui.t9Container.classList.remove('justify-start');
            } else {
                ui.t9Container.classList.add('justify-start');
                ui.t9Container.classList.remove('justify-end');
            }
        };

        document.getElementById('test-inject-btn').onclick = async () => {
            const injectId = document.getElementById('inject-id').value.trim();
            if (!injectId) {
                logErr('Inject ID empty');
                return;
            }
            logErr('Testing connection...');
            try {
                const res = await fetch(`https://11z.co/_w/${injectId}/selection?source=google`);
                if (!res.ok) throw new Error('Fetch failed');
                const text = await res.text();
                logErr(`Success: Received "${text.trim()}"`);
            } catch (err) {
                logErr(`Error: ${err.message}`);
            }
        };

        const resetTargetState = () => {
            state.target.isReady = false;
            state.target.audioUrl = null;
            renderList();
        };

        const pollIntegration = async () => {
            if (state.pollingTimer) clearInterval(state.pollingTimer);
            const injectId = document.getElementById('inject-id').value.trim();
            if (!injectId) return;

            const url = `https://11z.co/_w/${injectId}/selection?source=google`;
            try {
                const res = await fetch(url);
                if (res.ok) state.lastFetchVal = (await res.text()).trim();
            } catch (e) {}

            state.pollingTimer = setInterval(async () => {
                try {
                    const res = await fetch(url);
                    if (res.ok) {
                        const currentVal = (await res.text()).trim();
                        if (currentVal && currentVal !== state.lastFetchVal) {
                            clearInterval(state.pollingTimer);
                            resetTargetState();
                            executeGeneration(currentVal, true);
                        }
                    }
                } catch (e) {}
            }, 2000);
        };

        let pressTimer;
        const trigger = document.getElementById('secret-trigger');
        trigger.onmousedown = trigger.ontouchstart = () => { 
            pressTimer = setTimeout(() => { 
                if (state.pollingTimer) clearInterval(state.pollingTimer);
                ui.main.classList.add('hidden'); 
                ui.settings.classList.remove('hidden'); 
                renderDummySettings(); 
            }, 2000); 
        };
        trigger.onmouseup = trigger.ontouchend = () => clearTimeout(pressTimer);

        document.getElementById('close-settings').onclick = () => {
            ui.settings.classList.add('hidden');
            ui.main.classList.remove('hidden');
            renderList();
            if (state.mode === 'integration') pollIntegration();
        };

        let tapTimer;
        let taps = 0;
        const handleTap = (e) => {
            if(e.type === 'touchstart') e.preventDefault();
            if(state.mode !== 'manual') return; 
            taps++;
            clearTimeout(tapTimer);
            tapTimer = setTimeout(() => {
                if (taps >= 2) {
                    ui.t9.classList.remove('hidden');
                    ui.t9.classList.add('flex');
                    state.t9Input = '';
                    ui.t9Display.textContent = '';
                }
                taps = 0;
            }, 350);
        };
        
        const recTrigger = document.getElementById('record-trigger');
        recTrigger.addEventListener('touchstart', handleTap, {passive: false});
        recTrigger.addEventListener('mousedown', handleTap);

        document.getElementById('t9-dismiss').onclick = () => {
            ui.t9.classList.add('hidden');
            ui.t9.classList.remove('flex');
        };

        document.querySelectorAll('.t9-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                initAudio();
                const v = btn.dataset.val;
                if (v === 'clear') state.t9Input = '';
                else state.t9Input += v;
                ui.t9Display.textContent = state.t9Input;
            };
        });

        const executeGeneration = async (inputValue, isIntegration = false) => {
            const apiKey = document.getElementById('api-key').value.trim();
            const voiceId = document.getElementById('voice-id').value.trim();
            
            let template = document.getElementById('template-text').value.trim();
            if (!template) template = "I knew you would pick [X]";
            
            let selectedWord = "nothing";

            if (isIntegration) {
                selectedWord = inputValue;
            } else {
                const wordsList = document.getElementById('word-list').value;
                const words = wordsList ? wordsList.split('\n').map(w => w.trim()).filter(w => w) : [];
                const wordIndex = parseInt(inputValue) || 1;
                const safeIndex = (wordIndex > 0 && wordIndex <= words.length) ? wordIndex - 1 : 0;
                if (words.length > 0) selectedWord = words[safeIndex];
            }

            if (!apiKey || !voiceId) {
                logErr('Missing API Key or Voice ID configuration.');
                return;
            }

            const finalSpeech = template.replace(/\[X\]/g, selectedWord);

            try {
                const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                    method: 'POST',
                    headers: { 'Accept': 'audio/mpeg', 'xi-api-key': apiKey, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: finalSpeech, model_id: "eleven_multilingual_v2" })
                });

                if (!res.ok) throw new Error(`API Error: ${res.status}`);
                
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                
                const tempAudio = new Audio(url);
                tempAudio.onloadedmetadata = () => {
                    state.target.audioUrl = url;
                    state.target.duration = Math.ceil(tempAudio.duration);
                    state.target.isReady = true;
                    renderList();
                };
            } catch (err) {
                logErr(err.message);
            }
        };

        document.getElementById('t9-submit').onclick = (e) => {
            e.stopPropagation();
            ui.t9.classList.add('hidden');
            ui.t9.classList.remove('flex');
            resetTargetState();
            executeGeneration(state.t9Input, false);
        };

        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('base-date').value = now.toISOString().slice(0,16);
        
        renderList();
    </script>
</body>
</html>
